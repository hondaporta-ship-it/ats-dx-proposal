<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS DX推進提案書 — アクセス認証</title>
<style>
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(160deg, #1a3a6b, #0f2447); margin: 0; }
  .auth-box { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  h1 { color: #1a3a6b; font-size: 1.3em; margin-bottom: 8px; }
  p { color: #5a6c7e; font-size: 0.9em; margin-bottom: 24px; }
  input { width: 100%; padding: 12px; border: 2px solid #d1dce8; border-radius: 8px; font-size: 1em; margin-bottom: 16px; box-sizing: border-box; }
  input:focus { outline: none; border-color: #2d5aa0; }
  button { width: 100%; padding: 12px; background: #1a3a6b; color: #fff; border: none; border-radius: 8px; font-size: 1em; font-weight: 700; cursor: pointer; }
  button:hover { background: #2d5aa0; }
  .error { color: #e74c3c; font-size: 0.85em; display: none; }
  .lock-icon { font-size: 3em; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="lock-icon">🔒</div>
  <h1>ATS DX推進提案書</h1>
  <p>社外秘資料です。パスワードを入力してください。</p>
  <input type="password" id="pw" placeholder="パスワード" autofocus onkeypress="if(event.key==='Enter')unlock()">
  <div class="error" id="err">パスワードが違います</div>
  <button onclick="unlock()">開く</button>
</div>
<script>
function unlock(){
  var p=document.getElementById('pw').value;
  if(p==='ats2026'){
    // パスワードOK → 提案書ページへ
    window.location.href='proposal.html';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
  }
}
</script>
</body>
</html>
